<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Soda The Salon — Payroll Chart</title>
<script src="https://cdnjs.cloudflare.com/ajax/libs/Chart.js/4.4.1/chart.umd.js"></script>
<style>
  * { box-sizing: border-box; margin: 0; padding: 0; }
  body { font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif; background: #f9f9f7; color: #1a1a1a; }
  nav { background: #fff; border-bottom: 0.5px solid rgba(0,0,0,0.1); padding: 0 2rem; display: flex; align-items: center; gap: 2rem; height: 52px; }
  .nav-brand { font-weight: 500; font-size: 15px; color: #1a1a1a; text-decoration: none; }
  .nav-links { display: flex; gap: 1.5rem; }
  .nav-links a { font-size: 14px; color: #666; text-decoration: none; padding: 4px 0; border-bottom: 2px solid transparent; }
  .nav-links a:hover { color: #1a1a1a; }
  .nav-links a.active { color: #185FA5; border-bottom-color: #185FA5; }
  main { padding: 2rem; }
  h1 { font-size: 18px; font-weight: 500; margin: 0 0 1.5rem; color: #1a1a1a; }
  .metrics { display: flex; gap: 12px; flex-wrap: wrap; margin-bottom: 1.5rem; }
  .metric { background: #fff; border: 0.5px solid rgba(0,0,0,0.12); border-radius: 8px; padding: 1rem 1.25rem; flex: 1; min-width: 130px; }
  .metric-label { font-size: 12px; color: #666; margin: 0 0 4px; }
  .metric-value { font-size: 20px; font-weight: 500; margin: 0; }
  .metric-sub { font-size: 11px; color: #888; margin: 4px 0 0; }
  .legend { display: flex; gap: 16px; margin-bottom: 10px; font-size: 12px; color: #666; }
  .legend span { display: flex; align-items: center; gap: 5px; }
  .swatch { width: 10px; height: 10px; border-radius: 2px; display: inline-block; }
  .chart-wrap { position: relative; width: 100%; height: 380px; background: #fff; border: 0.5px solid rgba(0,0,0,0.1); border-radius: 8px; padding: 1rem; box-sizing: border-box; }
  .updated { font-size: 11px; color: #aaa; margin-top: 1rem; text-align: right; }
</style>
</head>
<body>

<nav>
  <a class="nav-brand" href="index.html">Soda The Salon</a>
  <div class="nav-links">
    <a href="index.html" class="active">Revenue chart</a>
    <a href="history.html">Payroll history</a>
  </div>
</nav>

<main>
<h1>Revenue vs Team IGA Cost</h1>

<div class="metrics">
  <div class="metric">
    <p class="metric-label">Peak revenue</p>
    <p class="metric-value" id="peakRev">—</p>
    <p class="metric-sub" id="peakRevDate"></p>
  </div>
  <div class="metric">
    <p class="metric-label">Avg revenue</p>
    <p class="metric-value" id="avgRev">—</p>
    <p class="metric-sub">per period</p>
  </div>
  <div class="metric">
    <p class="metric-label">Avg Team IGA</p>
    <p class="metric-value" id="avgIga">—</p>
    <p class="metric-sub">per period</p>
  </div>
  <div class="metric">
    <p class="metric-label">Avg IGA % of revenue</p>
    <p class="metric-value" id="igaPct">—</p>
    <p class="metric-sub">payroll cost ratio</p>
  </div>
</div>

<div class="legend">
  <span><span class="swatch" style="background:#185FA5;"></span>Revenue</span>
  <span><span class="swatch" style="background:#B54A00;"></span>Team IGA Cost</span>
</div>

<div class="chart-wrap">
  <canvas id="chart" role="img" aria-label="Dual axis line chart showing Revenue and Team IGA Cost per pay period.">Revenue and Team IGA Cost by pay period.</canvas>
</div>

<p class="updated" id="updatedTs"></p>
</main>

<script>
const DATA = {
  labels:  ['27 Apr 25','11 May 25','27 May 25','10 Jun 25','24 Jun 25','8 Jul 25','22 Jul 25','5 Aug 25','19 Aug 25','2 Sep 25','16 Sep 25','30 Sep 25','12 Oct 25','28 Oct 25','11 Nov 25','25 Nov 25','7 Dec 25','21 Dec 25','4 Jan 26','20 Jan 26','3 Feb 26','17 Feb 26','3 Mar 26','17 Mar 26','31 Mar 26','14 Apr 26','28 Apr 26'],
  revenue: [24704,33737,28830,27086,28624,28465,33373,33392,27598,33898,36745,36745,32137,33985,35061,39609,40364,47726,16354,36545,36650,38192,42144,37835,33614,29782,38558],
  iga:     [11735.19,13260.81,13754.74,14118.65,12985.47,13231.88,13105.80,12913.97,12063.08,13163.27,14492.07,14068.96,13930.35,14584.10,15107.76,15549.50,15976.93,17560.31,11910.55,14232.87,15400.74,16175.08,17024.67,15326.15,13094.51,11941.01,14483.71]
};

const fmt = v => '$' + Math.round(v).toLocaleString('en-AU');
const fmtK = v => '$' + (v/1000).toFixed(0) + 'k';

const avgRev = DATA.revenue.reduce((a,b)=>a+b,0)/DATA.revenue.length;
const avgIga = DATA.iga.reduce((a,b)=>a+b,0)/DATA.iga.length;
const peakIdx = DATA.revenue.indexOf(Math.max(...DATA.revenue));

document.getElementById('peakRev').textContent = fmt(DATA.revenue[peakIdx]);
document.getElementById('peakRevDate').textContent = DATA.labels[peakIdx];
document.getElementById('avgRev').textContent = fmt(avgRev);
document.getElementById('avgIga').textContent = fmt(avgIga);
document.getElementById('igaPct').textContent = (avgIga/avgRev*100).toFixed(1) + '%';
document.getElementById('updatedTs').textContent = 'Last updated: 1 May 2026 (2)';

new Chart(document.getElementById('chart'), {
  type: 'line',
  data: {
    labels: DATA.labels,
    datasets: [
      {
        label: 'Revenue',
        data: DATA.revenue,
        borderColor: '#185FA5',
        backgroundColor: 'rgba(24,95,165,0.07)',
        borderWidth: 2,
        pointBackgroundColor: '#185FA5',
        pointRadius: 4,
        pointHoverRadius: 6,
        fill: true,
        tension: 0.3,
        yAxisID: 'y'
      },
      {
        label: 'Team IGA Cost',
        data: DATA.iga,
        borderColor: '#B54A00',
        backgroundColor: 'rgba(181,74,0,0.06)',
        borderWidth: 2,
        pointBackgroundColor: '#B54A00',
        pointRadius: 4,
        pointHoverRadius: 6,
        fill: true,
        tension: 0.3,
        yAxisID: 'y'
      }
    ]
  },
  options: {
    responsive: true,
    maintainAspectRatio: false,
    interaction: { mode: 'index', intersect: false },
    plugins: {
      legend: { display: false },
      tooltip: {
        callbacks: {
          label: ctx => ' $' + Math.round(ctx.parsed.y).toLocaleString('en-AU'),
          afterBody: items => {
            const idx = items[0].dataIndex;
            const rev = DATA.revenue[idx];
            const iga = DATA.iga[idx];
            if (rev && iga) {
              return [' IGA ' + (iga / rev * 100).toFixed(1) + '%'];
            }
            return [];
          }
        }
      }
    },
    scales: {
      x: {
        ticks: { font: { size: 10 }, maxRotation: 45, autoSkip: false },
        grid: { color: 'rgba(0,0,0,0.06)' }
      },
      y: {
        type: 'linear',
        position: 'left',
        min: 0,
        ticks: { font: { size: 11 }, callback: fmtK },
        grid: { color: 'rgba(0,0,0,0.06)' }
      }
    }
  }
});
</script>
</body>
</html>
